name: Bug Report
description: Report a confirmed or suspected bug.
title: "[Bug]: "
type: Bug
projects: ["MCF-Technologie-GmbH/36"]

body:
  - type: markdown
    attributes:
      value: |
        <!-- mcf-issue-type: Bug -->

        # 🐛 Bug Report

        > [!IMPORTANT]
        > This form automatically sets the issue type to `Bug` and adds the issue to the `Softwareentwicklung` project.
        >
        > Use this form only when something existing is not working as expected.
        >
        > Before submitting this issue, please complete all required GitHub fields at the bottom of the form or in the issue sidebar.
        >
        > Required/important fields may include:
        > - Customer
        > - Priority
        > - Target milestone / release
        >
        > If the problem is unclear or cannot be reproduced yet, the issue may later be marked with `needs-info`.

  - type: input
    id: bug-summary
    attributes:
      label: Bug Summary
      description: Short and clear description of the problem.
      placeholder: "Example: Device status remains offline after reconnect"
    validations:
      required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: 1. Current Behavior
      description: Describe what is currently happening.
      placeholder: |
        What happens right now?

        Example:
        After reconnecting a device, the UI still shows the device as offline even though the backend receives status updates.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: 2. Expected Behavior
      description: Describe what should happen instead.
      placeholder: |
        What should happen?

        Example:
        After reconnecting a device, the UI should update the device status to online within a few seconds.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: 3. Steps to Reproduce
      description: Provide clear steps so the issue can be reproduced.
      placeholder: |
        1. Start the application / service
        2. Connect a device
        3. Disconnect the device
        4. Reconnect the device
        5. Observe the device status

        Include commands, test data, user actions, or configuration if relevant.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 4. Environment
      description: Add relevant runtime, software, hardware, or deployment context.
      placeholder: |
        Application / service:
        Version / commit:
        Repository:
        Environment: local / staging / production / customer system
        OS / platform:
        Browser / device:
        Hardware:
        Relevant configuration:
    validations:
      required: false

  - type: dropdown
    id: frequency
    attributes:
      label: 5. Frequency
      description: How often does the bug occur?
      options:
        - Always reproducible
        - Sometimes reproducible
        - Happened once
        - Unknown / not tested
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: 6. Impact
      description: Describe the operational, user, customer, or technical impact.
      placeholder: |
        Who or what is affected?

        Example:
        - Blocks customer testing
        - Breaks a critical workflow
        - Causes incorrect data display
        - Workaround exists / no workaround exists
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 7. Logs / Error Output
      description: Paste relevant logs, stack traces, console output, or error messages.
      placeholder: |
        Paste logs or error output here.
      render: shell
    validations:
      required: false

  - type: upload
    id: attachments
    attributes:
      label: Screenshots / Attachments
      description: Attach screenshots, videos, logs, exports, test files, or other evidence.
    validations:
      required: false

  - type: textarea
    id: workaround
    attributes:
      label: 8. Workaround
      description: Optional. Describe any known workaround.
      placeholder: |
        Is there a temporary workaround?

        Example:
        Restarting the backend service restores the device status updates.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 9. Additional Context
      description: Add anything else that may help with diagnosis or debugging.
      placeholder: |
        Add related issues, PRs, customer reports, assumptions, suspected root cause, or debugging notes.
    validations:
      required: false

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: Identifies which issue template was used. Do not change this value.
      options:
        - Bug
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---

        > [!NOTE]
        > A bug should describe a mismatch between expected behavior and actual behavior.

        > [!TIP]
        > Add logs, screenshots, reproduction steps, and environment details whenever possible. This reduces triage time.

        > [!IMPORTANT]
        > If the issue cannot be reproduced or lacks required information, add `needs-info` until the missing details are provided.
