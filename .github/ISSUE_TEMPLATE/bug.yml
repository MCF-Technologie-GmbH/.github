name: "🐛 Bug Report"
about: "Report an unexpected error, crash, or misbehavior in the code."
title: "[BUG]: "
labels: ["bug"]
type: "Bug"
body:
  - type: markdown
    attributes:
      value: |
        ### Thanks for taking the time to fill out this bug report!
        Please provide as much detail as possible so the development team can isolate and resolve the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: "📝 Description"
      description: "A clear and concise description of what the bug is. What is failing?"
      placeholder: "Example: The backend service crashes with a segmentation fault when parsing telemetry packets."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "🔁 Steps to Reproduce"
      description: "How do you trigger this bug? Please walk us through it step by step."
      value: |
        1. Go to '...'
        2. Click on '...'
        3. Run command '...'
        4. See error
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: "💻 Environment / Operating System"
      description: "Select the runtime environment where the bug occurred."
      options:
        - "Linux Embedded (Raspberry Pi)"
        - "Windows Subsystem for Linux (WSL)"
        - "Linux Desktop (Fedora / Ubuntu)"
        - "Android Virtual Machine (AVF)"
        - "Production Server"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "⚙️ Logs / Error Output"
      description: "Paste your terminal output, compiler errors, or stack traces here."
      render: bash

  - type: checkboxes
    id: checklist
    attributes:
      label: "📋 Pre-submission Checklist"
      description: "Please confirm the following before submitting."
      options:
        - label: "I have checked that this bug is not a duplicate of an existing issue."
          required: true
        - label: "I have included raw logs or clear steps to reproduce."
          required: true
