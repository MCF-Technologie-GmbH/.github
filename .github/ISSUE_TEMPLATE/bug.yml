name: Bug
description: Report a confirmed or suspected bug.
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > This form automatically sets the issue type to **Bug**.
        > Before submitting, please set the relevant Issue Fields: Priority, Scope, Effort, Start date, and Target date. Depending on the GitHub view, these fields may appear in the issue sidebar or at the bottom of the create-issue popup.

  - type: markdown
    attributes:
      value: "<!-- protected:start -->"

  - type: textarea
    id: current-behavior
    attributes:
      label: Current Behavior
      description: Describe what is currently happening.
      placeholder: |
        Example:
        After reconnecting a device, the UI still shows the device as offline even though the backend receives status updates.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: Describe what should happen instead.
      placeholder: |
        Example:
        After reconnecting a device, the UI should update the device status to online within a few seconds.
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      description: How often does the bug occur?
      options:
        - Always reproducible
        - Sometimes reproducible
        - Happened once
        - Unknown / not tested
    validations:
      required: false

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide clear steps, commands, test data, user actions, or
        configuration needed to reproduce the bug.
      placeholder: |
        Example:
        1. Start the application
        2. Connect a device
        3. Observe the offline status in the UI
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Add relevant runtime, software, hardware, or deployment context.
      placeholder: |
        Example:
        - App version: v1.4.2
        - OS: macOS 14.5
        - Browser: Chrome 126
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Describe the operational, user, customer, or technical impact.
      placeholder: |
        Example:
        - Blocks customer testing
        - Workaround exists: refresh the page
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- protected:end -->"

  - type: markdown
    attributes:
      value: "<!-- editable:start -->"

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste relevant logs, stack traces, console output, or error messages.
      placeholder: |
        Example:
        Error: Connection failed: timeout of 5000ms exceeded
      render: shell
    validations:
      required: false

  - type: upload
    id: attachments
    attributes:
      label: Screenshots / Attachments
      description: Attach screenshots, videos, logs, exports, test files, or other evidence.
    validations:
      required: false

  - type: textarea
    id: workaround
    attributes:
      label: Workaround
      description: Optional. Describe any known workaround.
      placeholder: |
        Example:
        Restarting the backend service restores the device status updates.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add anything else that may help with diagnosis or debugging.
      placeholder: |
        Example:
        - Related issue: #123
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- editable:end -->"

  - type: markdown
    attributes:
      value: "<!-- managed:start -->"

  - type: checkboxes
    id: required-updates
    attributes:
      label: Required updates
      description: Select the updates that are required for this issue.
      options:
        - label: Documentation
        - label: Tests
        - label: Release notes
        - label: Security review
        - label: Migration
        - label: CI
        - label: Config
  - type: markdown
    attributes:
      value: "<!-- managed:end -->"

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: Identifies which issue template was used. Do not change this value.
      options:
        - Bug
    validations:
      required: true
