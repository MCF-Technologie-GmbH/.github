name: Chore
description: A concrete unit of work that needs to be done.
type: Chore
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > Use **Chore** for routine tasks, tooling updates, dependencies, CI/CD configuration, or repository maintenance.
        > - **Do NOT** use Chore for bug fixes (use **Bug**), new features (use **Feature**), code restructuring/cleanup (use **Refactor**), or test additions/fixes (use **Test**).
        > Before submitting, please set the relevant Issue Fields: Priority, Scope, Effort, Start date, and Target date. Depending on the GitHub view, these fields may appear in the issue sidebar or at the bottom of the create-issue popup.

  - type: markdown
    attributes:
      value: "<!-- protected:start -->"

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the chore in detail, including why, background, context,
        or constraints.
      placeholder: |
        Example:
        Upgrade React from version 18.2 to 19.0 to support the new compiler and hooks.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define what "done" looks like for this chore.
      placeholder: |
        Example:
        - [ ] All tests pass on Node.js v22
        - [ ] Dependency warnings are resolved
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List any tasks, issues, PRs, or external requirements this chore
        depends on.
      placeholder: |
        Example:
        - Blocked by #123
        - Requires access to API server
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- protected:end -->"

  - type: markdown
    attributes:
      value: "<!-- editable:start -->"

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other relevant information, links, or notes.
      placeholder: |
        Example:
        - Links to design doc: https://...
        - Related issue: #456
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- editable:end -->"

  - type: markdown
    attributes:
      value: "<!-- managed:start -->"

  - type: checkboxes
    id: required-updates
    attributes:
      label: Required updates
      description: Select the updates that are required for this issue.
      options:
        - label: Documentation
        - label: Tests
        - label: Release notes
        - label: Security review
        - label: Migration
        - label: CI
        - label: Config
  - type: markdown
    attributes:
      value: "<!-- managed:end -->"

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: Identifies which issue template was used. Do not change this value.
      options:
        - Chore
    validations:
      required: true
