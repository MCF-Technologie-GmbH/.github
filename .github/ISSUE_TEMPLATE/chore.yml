name: Chore
description: A concrete unit of work that needs to be done.
title: "[Chore]: "
type: Chore
projects: ["MCF-Technologie-GmbH/37"]

body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > This form automatically sets the issue type to **Chore** and adds it to the **Softwareentwicklung** project board.
        > Before submitting, please ensure you fill in all required sidebar fields (Priority, Assignee, Target milestone/release).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the chore in detail.
      placeholder: |
        What exactly needs to be done and why?

        Include any relevant background, context, or constraints.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define what "done" looks like for this chore.
      placeholder: |
        - [ ] Criteria 1
        - [ ] Criteria 2
        - [ ] Criteria 3
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List any tasks, issues, PRs, or external requirements this chore depends on.
      placeholder: |
        - Blocked by #123
        - Requires access to ...
        - Depends on team X completing ...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other relevant information, links, or notes.
      placeholder: |
        Related issues, PRs, documentation, design decisions, etc.
    validations:
      required: false

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: Identifies which issue template was used. Do not change this value.
      options:
        - Chore
    validations:
      required: true
