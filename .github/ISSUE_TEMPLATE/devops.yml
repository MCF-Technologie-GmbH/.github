name: DevOps
description: Infrastructure, CI/CD pipelines, deployments, monitoring, or platform work.
title: "[DevOps]: "
type: DevOps
projects: ["MCF-Technologie-GmbH/37"]

body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > This form automatically sets the issue type to **DevOps** and adds it to the **Softwareentwicklung** project board.
        > Before submitting, please ensure you fill in all required sidebar fields (Priority, Assignee, Target milestone/release).

  - type: dropdown
    id: devops-type
    attributes:
      label: Type of Work
      description: What category of DevOps work is this?
      options:
        - CI/CD pipeline
        - Infrastructure / IaC
        - Deployment / release
        - Monitoring / alerting / logging
        - Secrets / credentials management
        - Container / image management
        - Environment setup
        - Access / permissions
        - Security hardening
        - Cost optimization
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the work in detail.
      placeholder: |
        What needs to be done and why?

        Example:
        Integrate Trivy into the GitHub Actions CI workflow to scan Docker images for known vulnerabilities on every pull request. Fail the build if critical vulnerabilities are found.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Trigger
      description: What is driving this work?
      placeholder: |
        Example:
        - Security audit requirement
        - Recurring manual deployment steps that should be automated
        - New environment needs to be provisioned
        - Existing pipeline is too slow / unreliable
    validations:
      required: false

  - type: textarea
    id: affected-systems
    attributes:
      label: Affected Systems / Services / Environments
      description: List the systems, services, repositories, or environments involved.
      placeholder: |
        Systems / services:
        Repositories:
        Environments: dev / staging / production
        Cloud provider / region:
    validations:
      required: false

  - type: textarea
    id: rollback-plan
    attributes:
      label: Rollback Plan
      description: How can this change be reverted if something goes wrong?
      placeholder: |
        Example:
        - Revert the workflow file commit to disable the new scan step
        - Terraform state can be rolled back using `terraform apply` on the previous revision
        - No rollback needed — change is additive only
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define what "done" looks like.
      placeholder: |
        - [ ] Pipeline runs successfully end-to-end
        - [ ] Change is tested in staging before production
        - [ ] Documentation / runbook updated if needed
        - [ ] Alerts and monitoring are in place
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any related issues, runbooks, infrastructure diagrams, or notes.
      placeholder: |
        Related issues, PRs, runbooks, architecture diagrams, external references, etc.
    validations:
      required: false

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: Identifies which issue template was used. Do not change this value.
      options:
        - DevOps
    validations:
      required: true
