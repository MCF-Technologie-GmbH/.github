name: Documentation
description: Create, update, or improve documentation.
type: Documentation
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > This form automatically sets the issue type to **Documentation**.

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: This is the only option for this template. GitHub does not allow
        changing it here; it is kept as creation metadata for automation.
      options:
        - Documentation
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        > [!NOTE]
        > Friendly reminder: set any relevant Issue Fields when they are needed. Depending on the GitHub view, these fields may appear in the issue sidebar or at the bottom of the create-issue popup. If a field does not apply yet, you can leave it empty and fill it in later.

  - type: markdown
    attributes:
      value: "<!-- protected:start -->"

  - type: dropdown
    id: docs-type
    attributes:
      label: Type of Documentation Work
      description: What kind of documentation work is this?
      options:
        - Create new documentation
        - Update existing documentation
        - Remove outdated documentation
        - Restructure / reorganize documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: what-to-document
    attributes:
      label: What Needs to Be Documented
      description: Describe the subject matter — what feature, process, or API should
        be documented or updated?
      placeholder: |
        Example:
        The device management REST API endpoints, request/response schemas, and authentication must be documented.
    validations:
      required: true

  - type: textarea
    id: target-audience
    attributes:
      label: Target Audience
      description: Who will read this documentation?
      placeholder: |
        Example:
        - External developers integrating via the API
        - Internal team members onboarding to the service
        - Operations team managing deployments
    validations:
      required: false

  - type: textarea
    id: existing-docs
    attributes:
      label: Existing Documentation
      description: Link to any existing documentation that is related, outdated, or
        should be replaced.
      placeholder: |
        Example:
        - Wiki page: https://github.com/.../wiki/Device-Management
        - README.md section on deployment
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define what "done" looks like for this documentation task.
      placeholder: |
        Example:
        - [ ] All endpoints are documented with request/response examples
        - [ ] Documentation is reviewed and approved
        - [ ] Published to the correct location
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- protected:end -->"

  - type: markdown
    attributes:
      value: "<!-- editable:start -->"

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other relevant information, related issues, or links.
      placeholder: |
        Example:
        - PR #123 contains the implementation details
        - Slack thread link: https://...
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- editable:end -->"
