name: Documentation
description: Create, update, or improve documentation.
title: "[Docs]: "
type: Documentation
projects: ["MCF-Technologie-GmbH/36"]

body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > This form automatically sets the issue type to **Documentation** and adds it to the **Softwareentwicklung** project board.
        > Before submitting, please ensure you fill in all required sidebar fields (Priority, Assignee, Target milestone/release).

  - type: input
    id: docs-summary
    attributes:
      label: Summary
      description: Short and clear description of the documentation work needed.
      placeholder: "Example: Write API reference for the device management endpoints"
    validations:
      required: true

  - type: dropdown
    id: docs-type
    attributes:
      label: Type of Documentation Work
      description: What kind of documentation work is this?
      options:
        - Create new documentation
        - Update existing documentation
        - Remove outdated documentation
        - Restructure / reorganize documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: what-to-document
    attributes:
      label: What Needs to Be Documented
      description: Describe the subject matter — what feature, process, or API should be documented or updated?
      placeholder: |
        What is the topic, feature, or system that needs documentation?

        Example:
        The device management REST API currently has no public reference. Endpoints, request/response schemas, and authentication must be documented.
    validations:
      required: true

  - type: textarea
    id: target-audience
    attributes:
      label: Target Audience
      description: Who will read this documentation?
      placeholder: |
        Example:
        - External developers integrating via the API
        - Internal team members onboarding to the service
        - Operations team managing deployments
    validations:
      required: false

  - type: textarea
    id: existing-docs
    attributes:
      label: Existing Documentation
      description: Link to any existing documentation that is related, outdated, or should be replaced.
      placeholder: |
        - Link to current docs (if any)
        - Related wiki pages, README sections, Confluence pages, etc.
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define what "done" looks like for this documentation task.
      placeholder: |
        - [ ] All endpoints are documented with request/response examples
        - [ ] Documentation is reviewed and approved
        - [ ] Published to the correct location
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other relevant information, related issues, or links.
      placeholder: |
        Related issues, PRs, source material, etc.
    validations:
      required: false

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: Identifies which issue template was used. Do not change this value.
      options:
        - Documentation
    validations:
      required: true
