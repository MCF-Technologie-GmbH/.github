name: Documentation
description: Create, update, or improve documentation.
type: Documentation
projects: [ "MCF-Technologie-GmbH/37" ]

body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > This form automatically sets the issue type to **Documentation** and adds it to the **Softwareentwicklung** project board.
        > Before submitting, please ensure you fill in all required sidebar fields (Priority, Assignee, Target milestone/release).

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Select the scope of this issue (the codebase area affected).
      options:
        - ui
        - api
        - backend
        - frontend
        - ci
        - gha
        - worker
        - deps
        - repo
        - tooling
        - infra
        - deploy
        - docs
        - config
        - security
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Select the priority of this issue.
      options:
        - Not Set
        - P0
        - P1
        - P2
        - P3
    validations:
      required: false

  - type: dropdown
    id: effort
    attributes:
      label: Effort
      description: Select the effort estimate for this issue.
      options:
        - Not Set
        - E1
        - E2
        - E3
        - E5
        - E8
        - E13
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- protected:start -->"

  - type: dropdown
    id: docs-type
    attributes:
      label: Type of Documentation Work
      description: What kind of documentation work is this?
      options:
        - Create new documentation
        - Update existing documentation
        - Remove outdated documentation
        - Restructure / reorganize documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: what-to-document
    attributes:
      label: What Needs to Be Documented
      description: Describe the subject matter — what feature, process, or API should
        be documented or updated?
      placeholder: |
        Example:
        The device management REST API endpoints, request/response schemas, and authentication must be documented.
    validations:
      required: true

  - type: textarea
    id: target-audience
    attributes:
      label: Target Audience
      description: Who will read this documentation?
      placeholder: |
        Example:
        - External developers integrating via the API
        - Internal team members onboarding to the service
        - Operations team managing deployments
    validations:
      required: false

  - type: textarea
    id: existing-docs
    attributes:
      label: Existing Documentation
      description: Link to any existing documentation that is related, outdated, or
        should be replaced.
      placeholder: |
        Example:
        - Wiki page: https://github.com/.../wiki/Device-Management
        - README.md section on deployment
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define what "done" looks like for this documentation task.
      placeholder: |
        Example:
        - [ ] All endpoints are documented with request/response examples
        - [ ] Documentation is reviewed and approved
        - [ ] Published to the correct location
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- protected:end -->"

  - type: markdown
    attributes:
      value: "<!-- editable:start -->"

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other relevant information, related issues, or links.
      placeholder: |
        Example:
        - PR #123 contains the implementation details
        - Slack thread link: https://...
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- editable:end -->"

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: Identifies which issue template was used. Do not change this value.
      options:
        - Documentation
    validations:
      required: true
