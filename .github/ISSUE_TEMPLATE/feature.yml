name: Feature Request
description: Propose a new feature or capability.
title: "[Feature]: "
type: Feature
projects: ["MCF-Technologie-GmbH/36"]

body:
  - type: markdown
    attributes:
      value: |
        # ✨ Feature Request

        > [!IMPORTANT]
        > This form automatically sets the issue type to `Feature` and adds the issue to the `Softwareentwicklung` project.
        >
        > Use this form to propose new functionality that does not yet exist.
        >
        > Before submitting this issue, please complete all required GitHub fields at the bottom of the form or in the issue sidebar.
        >
        > Required/important fields may include:
        > - Customer
        > - Priority
        > - Target milestone / release

  - type: input
    id: feature-summary
    attributes:
      label: Feature Summary
      description: Short and clear name for the feature.
      placeholder: "Example: Add CSV export for device telemetry data"
    validations:
      required: true

  - type: textarea
    id: problem-statement
    attributes:
      label: 1. Problem Statement / Motivation
      description: What problem does this feature solve? Who is affected and why does it matter?
      placeholder: |
        Describe the problem or need this feature addresses.

        Example:
        Customers currently have no way to export historical telemetry data for offline analysis. This leads to manual workarounds and support requests.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: 2. Proposed Solution
      description: Describe the feature you'd like to see implemented.
      placeholder: |
        How should this feature work?

        Example:
        Add a "Export as CSV" button to the device detail view that downloads the last 30 days of telemetry data.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 3. Acceptance Criteria
      description: Define what "done" looks like for this feature.
      placeholder: |
        - [ ] User can trigger an export from the device detail view
        - [ ] Exported file contains timestamp and all telemetry fields
        - [ ] Export works for up to 30 days of data
        - [ ] Feature is covered by tests
    validations:
      required: false

  - type: textarea
    id: out-of-scope
    attributes:
      label: 4. Out of Scope
      description: Explicitly list anything that is NOT part of this feature to prevent scope creep.
      placeholder: |
        - Real-time streaming exports
        - Custom date range selection (follow-up)
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 5. Alternatives Considered
      description: Have you considered any alternative approaches?
      placeholder: |
        Describe any alternatives you considered and why they were rejected.
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: 6. Dependencies
      description: List any issues, teams, or external systems this feature depends on.
      placeholder: |
        - Requires API endpoint from service X
        - Blocked by #123
    validations:
      required: false

  - type: upload
    id: attachments
    attributes:
      label: Mockups / Attachments
      description: Attach wireframes, mockups, diagrams, or supporting documents.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 7. Additional Context
      description: Add any other relevant information, customer requests, or links.
      placeholder: |
        Related issues, customer feedback, external references, etc.
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---

        > [!NOTE]
        > A feature request should describe new functionality. For improving something that already exists, use an Improvement issue instead.

        > [!TIP]
        > The clearer the acceptance criteria, the faster this issue can be estimated, implemented, and reviewed.

        > [!IMPORTANT]
        > If the feature is large, consider breaking it into smaller tasks or opening a Research/Spike first.
