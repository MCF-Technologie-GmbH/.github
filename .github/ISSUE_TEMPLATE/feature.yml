name: Feature
description: Propose a new feature or capability.
title: "[Feature]: "
type: Feature
projects: ["MCF-Technologie-GmbH/37"]

body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > This form automatically sets the issue type to **Feature** and adds it to the **Softwareentwicklung** project board.
        > Before submitting, please ensure you fill in all required sidebar fields (Priority, Customer, Target milestone/release).

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement / Motivation
      description: What problem does this feature solve? Who is affected and why does it matter?
      placeholder: |
        Describe the problem or need this feature addresses.

        Example:
        Customers currently have no way to export historical telemetry data for offline analysis. This leads to manual workarounds and support requests.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see implemented.
      placeholder: |
        How should this feature work?

        Example:
        Add a "Export as CSV" button to the device detail view that downloads the last 30 days of telemetry data.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define what "done" looks like for this feature.
      placeholder: |
        - [ ] User can trigger an export from the device detail view
        - [ ] Exported file contains timestamp and all telemetry fields
        - [ ] Export works for up to 30 days of data
        - [ ] Feature is covered by tests
    validations:
      required: false

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: Explicitly list anything that is NOT part of this feature to prevent scope creep.
      placeholder: |
        - Real-time streaming exports
        - Custom date range selection (follow-up)
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?
      placeholder: |
        Describe any alternatives you considered and why they were rejected.
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List any issues, teams, or external systems this feature depends on.
      placeholder: |
        - Requires API endpoint from service X
        - Blocked by #123
    validations:
      required: false

  - type: upload
    id: attachments
    attributes:
      label: Mockups / Attachments
      description: Attach wireframes, mockups, diagrams, or supporting documents.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other relevant information, customer requests, or links.
      placeholder: |
        Related issues, customer feedback, external references, etc.
    validations:
      required: false

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: Identifies which issue template was used. Do not change this value.
      options:
        - Feature
    validations:
      required: true
