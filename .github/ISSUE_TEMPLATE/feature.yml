name: Feature
description: New functional or technical capability, enhancement, or user-facing addition.
type: Feature
body:
  - type: markdown
    attributes:
      value: "<!-- issue-template-type: Feature -->"

  - type: markdown
    attributes:
      value: |
        > [!NOTE]
        > Set any relevant **Issue Fields** when they are needed. Depending on the GitHub view, these fields may appear in the **issue sidebar** or at the **bottom of the create-issue popup**. If a field does not apply yet, you can leave it empty and fill it in later.

  - type: markdown
    attributes:
      value: "<!-- protected:start -->"

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement / Motivation
      description: What problem does this feature solve? Who is affected and why does
        it matter?
      placeholder: |
        Example:
        Customers currently have no way to export historical telemetry data for offline analysis.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see implemented.
      placeholder: |
        Example:
        Add an "Export as CSV" button to the device detail view that downloads the last 30 days of telemetry data.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define what "done" looks like for this feature.
      placeholder: |
        Example:
        - [ ] User can trigger an export from the device detail view
        - [ ] Exported file contains timestamp and all telemetry fields
        - [ ] Export works for up to 30 days of data
        - [ ] Feature is covered by tests
    validations:
      required: false

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: Explicitly list anything that is NOT part of this feature to
        prevent scope creep.
      placeholder: |
        Example:
        - Real-time streaming exports
        - Custom date range selection (follow-up)
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?
      placeholder: |
        Example:
        We considered exporting as PDF, but CSV is preferred because customers want to import the raw data into Excel.
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List any issues, teams, or external systems this feature depends on.
      placeholder: |
        Example:
        - Requires API endpoint from backend
        - Blocked by #123
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- protected:end -->"

  - type: markdown
    attributes:
      value: "<!-- editable:start -->"

  - type: upload
    id: attachments
    attributes:
      label: Mockups / Attachments
      description: Attach wireframes, mockups, diagrams, or supporting documents.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other relevant information, customer requests, or links.
      placeholder: |
        Example:
        - Customer request Zendesk link: https://...
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- editable:end -->"

  - type: markdown
    attributes:
      value: "<!-- managed:start -->"

  - type: checkboxes
    id: required-updates
    attributes:
      label: Required updates
      description: Select the updates that are required for this issue.
      options:
        - label: Documentation
        - label: Tests
        - label: Release notes
        - label: Security review
        - label: Migration
        - label: CI
        - label: Config
  - type: markdown
    attributes:
      value: "<!-- managed:end -->"
