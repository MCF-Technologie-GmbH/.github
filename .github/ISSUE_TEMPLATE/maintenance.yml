name: Maintenance
description: Address technical debt, dependency updates, refactoring, or other housekeeping work.
title: "[Maintenance]: "
type: Maintenance
projects: ["MCF-Technologie-GmbH/36"]

body:
  - type: markdown
    attributes:
      value: |
        <!-- mcf-issue-type: Maintenance -->

        # 🛠️ Maintenance

        > [!IMPORTANT]
        > This form automatically sets the issue type to `Maintenance` and adds the issue to the `Softwareentwicklung` project.
        >
        > Use this form for technical debt, dependency upgrades, code refactoring, cleanup, or other housekeeping that keeps the codebase healthy.
        >
        > Before submitting this issue, please complete all required GitHub fields at the bottom of the form or in the issue sidebar.
        >
        > Required/important fields may include:
        > - Assignee
        > - Priority
        > - Target milestone / release

  - type: input
    id: maintenance-summary
    attributes:
      label: Maintenance Summary
      description: Short and clear description of the maintenance work needed.
      placeholder: "Example: Upgrade axios from v0.x to v1.x and fix breaking changes"
    validations:
      required: true

  - type: dropdown
    id: maintenance-type
    attributes:
      label: 1. Type of Maintenance
      description: What category of maintenance is this?
      options:
        - Dependency upgrade
        - Code refactoring
        - Technical debt reduction
        - Cleanup / dead code removal
        - Configuration update
        - Security patch
        - Performance optimization
        - Test coverage improvement
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 2. Description
      description: Describe the maintenance work in detail.
      placeholder: |
        What needs to be done and where?

        Example:
        axios v0.x is no longer maintained and has known vulnerabilities. Upgrade to v1.x, update all affected call sites to use the new response format, and verify all existing tests still pass.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 3. Reason / Trigger
      description: Why is this maintenance work needed now?
      placeholder: |
        Example:
        - Dependency flagged by Dependabot / security scanner
        - End-of-life notice from upstream maintainer
        - Accumulated technical debt identified during code review
        - Required before implementing feature X
    validations:
      required: false

  - type: textarea
    id: risk
    attributes:
      label: 4. Risk / Impact if Not Done
      description: What happens if this work is deferred or skipped?
      placeholder: |
        Example:
        - Known security vulnerability remains unpatched
        - Increasing difficulty making changes to affected module
        - Blocks future upgrades of dependent libraries
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 5. Acceptance Criteria
      description: Define what "done" looks like for this maintenance task.
      placeholder: |
        - [ ] Dependency updated to target version
        - [ ] All breaking changes resolved
        - [ ] Tests pass
        - [ ] No regression in affected functionality
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 6. Additional Context
      description: Add any related issues, PRs, links, or notes.
      placeholder: |
        Related issues, Dependabot alerts, changelogs, migration guides, etc.
    validations:
      required: false

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: Identifies which issue template was used. Do not change this value.
      options:
        - Maintenance
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---

        > [!NOTE]
        > Maintenance work keeps the codebase healthy and reduces future risk. It should be prioritized alongside feature work, not always deferred.

        > [!TIP]
        > Link to the upstream changelog or migration guide when upgrading dependencies.

        > [!IMPORTANT]
        > Ensure tests pass and no regressions are introduced before closing this issue.
