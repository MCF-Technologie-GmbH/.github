name: Maintenance
description: Address technical debt, dependency updates, refactoring, or other housekeeping work.
title: "[Maintenance]: "
type: Maintenance
projects: ["MCF-Technologie-GmbH/37"]

body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > This form automatically sets the issue type to **Maintenance** and adds it to the **Softwareentwicklung** project board.
        > Before submitting, please ensure you fill in all required sidebar fields (Priority, Assignee, Target milestone/release).

  - type: dropdown
    id: maintenance-type
    attributes:
      label: Type of Maintenance
      description: What category of maintenance is this?
      options:
        - Dependency upgrade
        - Code refactoring
        - Technical debt reduction
        - Cleanup / dead code removal
        - Configuration update
        - Security patch
        - Performance optimization
        - Test coverage improvement
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the maintenance work in detail.
      placeholder: |
        What needs to be done and where?

        Example:
        axios v0.x is no longer maintained and has known vulnerabilities. Upgrade to v1.x, update all affected call sites to use the new response format, and verify all existing tests still pass.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason / Trigger
      description: Why is this maintenance work needed now?
      placeholder: |
        Example:
        - Dependency flagged by Dependabot / security scanner
        - End-of-life notice from upstream maintainer
        - Accumulated technical debt identified during code review
        - Required before implementing feature X
    validations:
      required: false

  - type: textarea
    id: risk
    attributes:
      label: Risk / Impact if Not Done
      description: What happens if this work is deferred or skipped?
      placeholder: |
        Example:
        - Known security vulnerability remains unpatched
        - Increasing difficulty making changes to affected module
        - Blocks future upgrades of dependent libraries
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define what "done" looks like for this maintenance task.
      placeholder: |
        - [ ] Dependency updated to target version
        - [ ] All breaking changes resolved
        - [ ] Tests pass
        - [ ] No regression in affected functionality
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any related issues, PRs, links, or notes.
      placeholder: |
        Related issues, Dependabot alerts, changelogs, migration guides, etc.
    validations:
      required: false

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: Identifies which issue template was used. Do not change this value.
      options:
        - Maintenance
    validations:
      required: true
