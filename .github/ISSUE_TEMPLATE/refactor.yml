name: Refactor
description: Code cleanup, restructuring, or technical debt reduction.
type: Refactor
projects: [ "MCF-Technologie-GmbH/37" ]

body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > Use **Refactor** for code cleanup, restructuring, optimization, or technical debt reduction that does not change functional behavior.
        > - **Do NOT** use Refactor for bug fixes (use **Bug**) or new features (use **Feature**).
        > Before submitting, please ensure you fill in all required sidebar fields (Priority, Scope, Effort, Target milestone/release).

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Select the scope of this issue (the codebase area affected).
      options:
        - ui
        - api
        - backend
        - frontend
        - ci
        - gha
        - worker
        - deps
        - repo
        - tooling
        - infra
        - deploy
        - docs
        - config
        - security
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Select the priority of this issue.
      options:
        - Not Set
        - P0
        - P1
        - P2
        - P3
    validations:
      required: false

  - type: dropdown
    id: effort
    attributes:
      label: Effort
      description: Select the effort estimate for this issue.
      options:
        - Not Set
        - E1
        - E2
        - E3
        - E5
        - E8
        - E13
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- protected:start -->"

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe what needs to be refactored.
      placeholder: |
        Example:
        Refactor the PaymentGateway interface to support multiple providers (Stripe, PayPal) instead of being hardcoded to Stripe.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Benefits
      description: Why are we refactoring this now? What are the expected benefits
        (e.g., testability, performance, maintainability)?
      placeholder: |
        Example:
        Improves testability by allowing us to mock providers easily, and prepares the codebase for integrating PayPal next month.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define what "done" looks like for this refactoring.
      placeholder: |
        Example:
        - [ ] Code is refactored according to the description
        - [ ] No regression in existing functionality
        - [ ] All tests pass
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List any tasks, issues, PRs, or external requirements this refactor
        depends on.
      placeholder: |
        Example:
        - Blocked by #123
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- protected:end -->"

  - type: markdown
    attributes:
      value: "<!-- editable:start -->"

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other relevant information, links, or notes.
      placeholder: |
        Example:
        - Design doc: https://...
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- editable:end -->"

  - type: markdown
    attributes:
      value: "<!-- managed:start -->"

  - type: checkboxes
    id: required-updates
    attributes:
      label: Required updates
      description: Select the updates that are required for this issue.
      options:
        - label: Documentation
        - label: Tests
        - label: Release notes
        - label: Security review
        - label: Migration
        - label: CI
        - label: Config
  - type: markdown
    attributes:
      value: "<!-- managed:end -->"

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: Identifies which issue template was used. Do not change this value.
      options:
        - Refactor
    validations:
      required: true
