name: Refactor
description: Code cleanup, restructuring, or technical debt reduction.
type: Refactor
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > This form automatically sets the issue type to **Refactor**.
        > Use **Refactor** for code cleanup, restructuring, optimization, or technical debt reduction that does not change functional behavior.
        > - **Do NOT** use Refactor for bug fixes (use **Bug**) or new features (use **Feature**).

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: This is the only option for this template. GitHub does not allow
        changing it here; it is kept as creation metadata for automation.
      options:
        - Refactor
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        > [!NOTE]
        > Friendly reminder: set any relevant Issue Fields when they are needed. Depending on the GitHub view, these fields may appear in the issue sidebar or at the bottom of the create-issue popup. If a field does not apply yet, you can leave it empty and fill it in later.

  - type: markdown
    attributes:
      value: "<!-- protected:start -->"

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe what needs to be refactored.
      placeholder: |
        Example:
        Refactor the PaymentGateway interface to support multiple providers (Stripe, PayPal) instead of being hardcoded to Stripe.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Benefits
      description: Why are we refactoring this now? What are the expected benefits
        (e.g., testability, performance, maintainability)?
      placeholder: |
        Example:
        Improves testability by allowing us to mock providers easily, and prepares the codebase for integrating PayPal next month.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define what "done" looks like for this refactoring.
      placeholder: |
        Example:
        - [ ] Code is refactored according to the description
        - [ ] No regression in existing functionality
        - [ ] All tests pass
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List any tasks, issues, PRs, or external requirements this refactor
        depends on.
      placeholder: |
        Example:
        - Blocked by #123
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- protected:end -->"

  - type: markdown
    attributes:
      value: "<!-- editable:start -->"

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other relevant information, links, or notes.
      placeholder: |
        Example:
        - Design doc: https://...
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- editable:end -->"

  - type: markdown
    attributes:
      value: "<!-- managed:start -->"

  - type: checkboxes
    id: required-updates
    attributes:
      label: Required updates
      description: Select the updates that are required for this issue.
      options:
        - label: Documentation
        - label: Tests
        - label: Release notes
        - label: Security review
        - label: Migration
        - label: CI
        - label: Config
  - type: markdown
    attributes:
      value: "<!-- managed:end -->"
