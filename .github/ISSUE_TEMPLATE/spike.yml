name: Spike
description: A timeboxed technical investigation used to reduce uncertainty before implementation.
type: Spike
projects: ["MCF-Technologie-GmbH/37"]

body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > This form automatically sets the issue type to **Spike** and adds it to the **Softwareentwicklung** project board.
        > Before submitting, please ensure you fill in all required sidebar fields (Priority, Assignee, Time box/estimate).

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Select the scope of this issue (the codebase area affected).
      options:
        - ui
        - api
        - backend
        - frontend
        - ci
        - gha
        - worker
        - deps
        - repo
        - tooling
        - infra
        - deploy
        - docs
        - config
        - security
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Select the priority of this issue.
      options:
        - Not Set
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Effort
      description: Select the effort estimate for this issue.
      options:
        - Not Set
        - E1
        - E2
        - E3
        - E5
        - E8
        - E13
    validations:
      required: true

  - type: markdown
    attributes:
      value: "<!-- protected:start -->"

  - type: textarea
    id: background
    attributes:
      label: Background / Motivation
      description: Why is this investigation necessary? What triggered it?
      placeholder: |
        Example:
        We need to implement real-time device status updates but are unsure if WebSockets or Server-Sent Events is more suitable for our server constraints.
    validations:
      required: true

  - type: textarea
    id: goals
    attributes:
      label: Goals / Questions to Answer
      description: List the specific questions this spike must answer.
      placeholder: |
        Example:
        - Does WebSocket connection overhead impact our memory usage significantly?
        - What is the estimated development effort for SSE vs WebSockets?
    validations:
      required: true

  - type: textarea
    id: investigation-scope
    attributes:
      label: Scope & Time Box
      description: Define the boundaries of this investigation and the maximum time to spend.
      placeholder: |
        Example:
        In scope:
        - Prototype SSE and WebSockets in a test branch
        Out of scope:
        - Production-ready implementation
        Time box: 2 days
    validations:
      required: false

  - type: textarea
    id: expected-output
    attributes:
      label: Expected Output / Deliverable
      description: What should this spike produce when complete?
      placeholder: |
        Example:
        - Written summary with comparison of options
        - A recommendation with rationale
        - A proof-of-concept implementation
        - A follow-up issue or task
    validations:
      required: true

  - type: markdown
    attributes:
      value: "<!-- protected:end -->"

  - type: markdown
    attributes:
      value: "<!-- editable:start -->"

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any related issues, existing research, constraints, or reference material.
      placeholder: |
        Example:
        - MDN WebSockets documentation
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- editable:end -->"

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: Identifies which issue template was used. Do not change this value.
      options:
        - Spike
    validations:
      required: true
