name: Spike
description: A timeboxed technical investigation used to reduce uncertainty before implementation.
title: "[Spike]: "
type: Spike
projects: ["MCF-Technologie-GmbH/37"]

body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > This form automatically sets the issue type to **Spike** and adds it to the **Softwareentwicklung** project board.
        > Before submitting, please ensure you fill in all required sidebar fields (Priority, Assignee, Time box/estimate).

  - type: textarea
    id: background
    attributes:
      label: Background / Motivation
      description: Why is this investigation necessary? What triggered it?
      placeholder: |
        What uncertainty, risk, or open question is driving this spike?

        Example:
        We need to implement real-time device status updates but are unsure which transport mechanism is most suitable given our infrastructure constraints.
    validations:
      required: true

  - type: textarea
    id: goals
    attributes:
      label: Goals / Questions to Answer
      description: List the specific questions this spike must answer.
      placeholder: |
        - Which approach best fits our current infrastructure?
        - What is the estimated effort for each option?
        - Are there any security or scalability concerns?
        - What are the trade-offs?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope & Time Box
      description: Define the boundaries of this investigation and the maximum time to spend.
      placeholder: |
        In scope:
        - ...

        Out of scope:
        - ...

        Time box: X days / X hours
    validations:
      required: false

  - type: textarea
    id: expected-output
    attributes:
      label: Expected Output / Deliverable
      description: What should this spike produce when complete?
      placeholder: |
        Example:
        - Written summary with comparison of options
        - A recommendation with rationale
        - A proof-of-concept implementation
        - A follow-up issue or task
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any related issues, existing research, constraints, or reference material.
      placeholder: |
        Related issues, external documentation, constraints, known approaches, etc.
    validations:
      required: false

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: Identifies which issue template was used. Do not change this value.
      options:
        - Spike
    validations:
      required: true
