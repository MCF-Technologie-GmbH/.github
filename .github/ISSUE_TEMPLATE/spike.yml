name: Research / Spike
description: Investigate an unknown, evaluate options, or reduce uncertainty before implementation.
title: "[Spike]: "
type: Task
projects: ["MCF-Technologie-GmbH/36"]

body:
  - type: markdown
    attributes:
      value: |
        <!-- mcf-issue-type: Task -->

        # 🔬 Research / Spike

        > [!IMPORTANT]
        > This form automatically sets the issue type to `Task` and adds the issue to the `Softwareentwicklung` project.
        >
        > Use this form when you need to investigate a problem, evaluate options, or reduce uncertainty before committing to an implementation.
        >
        > A spike should be time-boxed and produce a concrete output (summary, decision, PoC, or recommendation).
        >
        > Before submitting this issue, please complete all required GitHub fields at the bottom of the form or in the issue sidebar.
        >
        > Required/important fields may include:
        > - Assignee
        > - Priority
        > - Time box (estimate)

  - type: input
    id: spike-summary
    attributes:
      label: Spike Summary
      description: Short and clear description of what needs to be investigated.
      placeholder: "Example: Evaluate real-time messaging solutions (WebSocket vs. SSE vs. polling)"
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 1. Background / Motivation
      description: Why is this investigation necessary? What triggered it?
      placeholder: |
        What uncertainty, risk, or open question is driving this spike?

        Example:
        We need to implement real-time device status updates but are unsure which transport mechanism is most suitable given our infrastructure constraints.
    validations:
      required: true

  - type: textarea
    id: goals
    attributes:
      label: 2. Goals / Questions to Answer
      description: List the specific questions this spike must answer.
      placeholder: |
        - Which approach best fits our current infrastructure?
        - What is the estimated effort for each option?
        - Are there any security or scalability concerns?
        - What are the trade-offs?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 3. Scope & Time Box
      description: Define the boundaries of this investigation and the maximum time to spend.
      placeholder: |
        In scope:
        - ...

        Out of scope:
        - ...

        Time box: X days / X hours
    validations:
      required: false

  - type: textarea
    id: expected-output
    attributes:
      label: 4. Expected Output / Deliverable
      description: What should this spike produce when complete?
      placeholder: |
        Example:
        - Written summary with comparison of options
        - A recommendation with rationale
        - A proof-of-concept implementation
        - A follow-up issue or task
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: 5. Additional Context
      description: Add any related issues, existing research, constraints, or reference material.
      placeholder: |
        Related issues, external documentation, constraints, known approaches, etc.
    validations:
      required: false

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: Identifies which issue template was used. Do not change this value.
      options:
        - Task
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---

        > [!NOTE]
        > A spike should be time-boxed. If it grows beyond its scope, reassess and open follow-up issues.

        > [!TIP]
        > The output of a spike is a decision or recommendation — not necessarily production-ready code.

        > [!IMPORTANT]
        > Close this issue with a summary comment linking to findings, decisions, or follow-up tasks.
