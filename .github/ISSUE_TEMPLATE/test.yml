name: Test
description: Add, improve, or repair tests.
type: Test
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > This form automatically sets the issue type to **Test**.
        > Use **Test** for adding, fixing, or improving tests (unit tests, integration tests, E2E tests, smoke tests).
        > - **Do NOT** use Test for bug fixes (use **Bug**) or new features (use **Feature**).

  - type: dropdown
    id: template-type
    attributes:
      label: Issue Type
      description: This is the only option for this template. GitHub does not allow
        changing it here; it is kept as creation metadata for automation.
      options:
        - Test
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        > [!NOTE]
        > Friendly reminder: set any relevant Issue Fields when they are needed. Depending on the GitHub view, these fields may appear in the issue sidebar or at the bottom of the create-issue popup. If a field does not apply yet, you can leave it empty and fill it in later.

  - type: markdown
    attributes:
      value: "<!-- protected:start -->"

  - type: textarea
    id: what-to-test
    attributes:
      label: What Needs to Be Tested
      description: Describe the target component, module, service, or flow that lacks
        testing or has failing tests.
      placeholder: |
        Example:
        The auth helper functions in src/utils/auth.js have 0% coverage and need unit tests.
    validations:
      required: true

  - type: textarea
    id: test-approach
    attributes:
      label: Test Approach / Tools
      description: What kind of test are we writing (e.g. Unit, Integration, E2E)?
        What framework, mock strategy, or test suite should be used?
      placeholder: |
        Example:
        Write unit tests using Jest, mocking the external auth API response.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define what "done" looks like for this test task.
      placeholder: |
        Example:
        - [ ] Tests are written and passing
        - [ ] Coverage for target code is increased to X%
        - [ ] Tests run successfully in the CI pipeline
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List any tasks, issues, PRs, or external requirements this test
        task depends on.
      placeholder: |
        Example:
        - Blocked by #123
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- protected:end -->"

  - type: markdown
    attributes:
      value: "<!-- editable:start -->"

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other relevant information, links, or notes.
      placeholder: |
        Example:
        - Reference PR: #123
    validations:
      required: false

  - type: markdown
    attributes:
      value: "<!-- editable:end -->"

  - type: markdown
    attributes:
      value: "<!-- managed:start -->"

  - type: checkboxes
    id: required-updates
    attributes:
      label: Required updates
      description: Select the updates that are required for this issue.
      options:
        - label: Documentation
        - label: Tests
        - label: Release notes
        - label: Security review
        - label: Migration
        - label: CI
        - label: Config
  - type: markdown
    attributes:
      value: "<!-- managed:end -->"
