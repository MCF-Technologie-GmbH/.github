name: Taxonomy Sync

on:
  push:
    branches: [main]
    paths:
      - "taxonomy/**"
      - "scripts/validate-taxonomy.mjs"
      - "scripts/sync-taxonomy.mjs"
      - ".github/workflows/taxonomy-sync.yml"
  workflow_dispatch:

jobs:
  sync:
    name: Validate & Sync Taxonomy
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3

        with:
          client-id: ${{ vars.MCF_GITHUB_APP_ID }}
          private-key: ${{ secrets.MCF_GITHUB_PRIVATE_KEY }}
          owner: MCF-Technologie-GmbH

      - name: Validate taxonomy
        run: node scripts/validate-taxonomy.mjs

      - name: Sync taxonomy to GitHub
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: node scripts/sync-taxonomy.mjs
