# Issue Fields — MCF Technologie GmbH
#
# This file is the source of truth for all issue fields in the organization.
# Changes here are synced to GitHub by the taxonomy-sync workflow.
#
# IDs are assigned by GitHub and resolved at runtime — do not add them here.
# The sync script matches fields and options by name.
#
# Supported data_type values: TEXT, SINGLE_SELECT, DATE, NUMBER, MULTI_SELECT
# Supported color values: GRAY, BLUE, GREEN, YELLOW, ORANGE, RED, PINK, PURPLE

issue_fields:
  - key: priority
    name: Priority
    data_type: SINGLE_SELECT
    options:
      - name: P0
        color: PINK
        description: "Urgent / Critical -\nBlockiert Lieferung, Produktion, Abnahme oder ein wichtiges Kundenprojekt"
      - name: P1
        color: RED
        description: "High -\nMuss zeitnah erledigt werden, wichtig für Meilenstein oder Teamfortschritt"
      - name: P2
        color: YELLOW
        description: "Medium - Normal wichtige Arbeit, gehört in den geplanten Backlog"
      - name: P3
        color: GREEN
        description: "Low - Nice-to-have, Verbesserung, Cleanup, Komfortfunktion"

  - key: start_date
    name: Start date
    data_type: DATE

  - key: target_date
    name: Target date
    data_type: DATE

  - key: effort
    name: Effort
    data_type: SINGLE_SELECT
    options:
      - name: E13
        color: PINK
        description: "sehr große/unklare Aufgabe\nsollte meistens zerlegt werden"
      - name: E8
        color: RED
        description: "große Aufgabe\nmehrere Tage, Integration/Abstimmung"
      - name: E5
        color: ORANGE
        description: "Mittlere Aufgabe\nmehrere Schritte, etwas Abstimmung"
      - name: E3
        color: YELLOW
        description: "Normale Aufgabe\n1–2 Tage, gut planbar"
      - name: E2
        color: GREEN
        description: "kleine Aufgabe\nca. halber bis ein Tag"
      - name: E1
        color: BLUE
        description: "Mini-Aufgabe\nwenige Stunden, sehr klar"

  - key: customer
    name: Customer
    data_type: SINGLE_SELECT
    options:
      - name: Luetze
        color: GRAY
        description: null
      - name: Harman
        color: GRAY
        description: null
      - name: Audi
        color: GRAY
        description: null
      - name: Samson
        color: GRAY
        description: null
      - name: B.Braun
        color: GRAY
        description: null

  - key: project_id
    name: Project ID
    data_type: TEXT
