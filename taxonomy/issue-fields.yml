# Issue Fields — MCF Technologie GmbH
#
# This file is the source of truth for all issue fields in the organization.
# Changes here are synced to GitHub by the taxonomy-sync workflow.
#
# IDs are assigned by GitHub and resolved at runtime — do not add them here.
# The sync script matches fields and options by name.
#
# Supported data_type values: TEXT, SINGLE_SELECT, DATE, NUMBER, MULTI_SELECT
# Supported color values: GRAY, BLUE, GREEN, YELLOW, ORANGE, RED, PINK, PURPLE

issue_fields:
  - key: priority
    name: Priority
    data_type: SINGLE_SELECT
    options:
      - name: Not Set
        color: GRAY
      - name: P0
        color: RED
      - name: P1
        color: ORANGE
      - name: P2
        color: YELLOW
      - name: P3
        color: GREEN

  - key: effort
    name: Effort
    data_type: SINGLE_SELECT
    options:
      - name: Not Set
        color: GRAY
      - name: E1
        color: GREEN
      - name: E2
        color: GREEN
      - name: E3
        color: BLUE
      - name: E5
        color: YELLOW
      - name: E8
        color: ORANGE
      - name: E13
        color: RED

  - key: start_date
    name: Start date
    data_type: DATE

  - key: target_date
    name: Target date
    data_type: DATE

  - key: scope
    name: Scope
    data_type: SINGLE_SELECT
    options:
      - name: Not Set
        color: GRAY
      - name: ui
        color: GRAY
      - name: api
        color: GRAY
      - name: backend
        color: GRAY
      - name: frontend
        color: GRAY
      - name: ci
        color: GRAY
      - name: gha
        color: GRAY
      - name: worker
        color: GRAY
      - name: deps
        color: GRAY
      - name: repo
        color: GRAY
      - name: tooling
        color: GRAY
      - name: infra
        color: GRAY
      - name: deploy
        color: GRAY
      - name: docs
        color: GRAY
      - name: config
        color: GRAY
      - name: security
        color: GRAY
