# Issue Fields — MCF Technologie GmbH
#
# This file is the source of truth for all issue fields in the organization.
# Changes here are synced to GitHub by the taxonomy-sync workflow.
#
# Supported data_type values: TEXT, SINGLE_SELECT, DATE, NUMBER, MULTI_SELECT
# Supported color values: GRAY, BLUE, GREEN, YELLOW, ORANGE, RED, PINK, PURPLE

issue_fields:
  - key: priority
    name: Priority
    id: IFSS_kgDOAYRswg
    data_type: SINGLE_SELECT
    options:
      - name: P0
        id: IFSSO_kgDOAqem3w
        color: PINK
        description: "Urgent / Critical -\nBlockiert Lieferung, Produktion, Abnahme oder ein wichtiges Kundenprojekt"
      - name: P1
        id: IFSSO_kgDOAqem4A
        color: RED
        description: "High -\nMuss zeitnah erledigt werden, wichtig für Meilenstein oder Teamfortschritt"
      - name: P2
        id: IFSSO_kgDOAqem4Q
        color: YELLOW
        description: "Medium - Normal wichtige Arbeit, gehört in den geplanten Backlog"
      - name: P3
        id: IFSSO_kgDOAqem4g
        color: GREEN
        description: "Low - Nice-to-have, Verbesserung, Cleanup, Komfortfunktion"

  - key: start_date
    name: Start date
    id: IFD_kgDOAYRsww
    data_type: DATE

  - key: target_date
    name: Target date
    id: IFD_kgDOAYRsxA
    data_type: DATE

  - key: effort
