        id: IFSSO_kgDOAqem5A
        color: RED
        description: "große Aufgabe\nmehrere Tage, Integration/Abstimmung"
      - name: E5
        id: IFSSO_kgDOAqem5Q
        color: ORANGE
        description: "Mittlere Aufgabe\nmehrere Schritte, etwas Abstimmung"
      - name: E3
        id: IFSSO_kgDOBG_PTA
        color: YELLOW
        description: "Normale Aufgabe\n1–2 Tage, gut planbar"
      - name: E2
        id: IFSSO_kgDOBG_PTQ
        color: GREEN
