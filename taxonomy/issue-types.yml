# Issue Types — MCF Technologie GmbH
#
# This file is the source of truth for all issue types in the organization.
# Changes here are synced to GitHub by the taxonomy-sync workflow.
#
# IDs are assigned by GitHub and resolved at runtime — do not add them here.
# The sync script matches types by name.
#
# To inspect current state:
#   gh api /orgs/MCF-Technologie-GmbH/issue-types

issue_types:
  - key: chore
    name: Chore
    description: "Routine task, tooling update, dependencies, CI/CD configuration, or repository maintenance that does not alter product behavior."
    color: YELLOW
    is_enabled: true

  - key: bug
    name: Bug
    description: "Unexpected error, defect, or incorrect behavior in the codebase."
    color: RED
    is_enabled: true

  - key: feature
    name: Feature
    description: "New functional or technical capability, enhancement, or user-facing addition."
    color: BLUE
    is_enabled: true

  - key: refactor
    name: Refactor
    description: "Internal code restructuring, cleanup, or optimization that improves code quality without changing external behavior."
    color: ORANGE
    is_enabled: true

  - key: test
    name: Test
    description: "Addition, improvement, or repair of unit, integration, end-to-end, or smoke tests."
    color: GREEN
    is_enabled: true

  - key: spike
    name: Spike
    description: "A timeboxed technical investigation used to reduce uncertainty before implementation. It does not directly deliver production functionality, but must produce a clear technical conclusion, recommendation, or proof of concept."
    color: GRAY
    is_enabled: true

  - key: documentation
    name: Documentation
    description: "Writing or modifying internal docs, guides, api specs, or release notes."
    color: PURPLE
    is_enabled: true

  - key: project
    name: Project
    description: "High-level planning container used for epics, milestones, or project management."
    color: BLUE
    is_enabled: true
