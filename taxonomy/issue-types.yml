# Issue Types — MCF Technologie GmbH
#
# This file is the source of truth for all issue types in the organization.
# Changes here are synced to GitHub by the taxonomy-sync workflow.
#
# To refresh IDs from GitHub:
#   gh api graphql -H "GraphQL-Features: issue_types" \
#     -f query='query { organization(login: "MCF-Technologie-GmbH") {
#       issueTypes(first: 20) { nodes { id name } } } }'

issue_types:
  - key: task
    name: Task
    id: IT_kwDOCAEFQs4BKtmG
    description: "Konkrete Arbeitsaufgabe ohne direkten Feature-Charakter"
    color: YELLOW
    is_enabled: true

  - key: bug
    name: Bug
    id: IT_kwDOCAEFQs4BKtmJ
    description: "Unerwartetes Fehlverhalten oder Problem"
    color: RED
