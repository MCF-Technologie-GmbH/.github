# Issue Types — MCF Technologie GmbH
#
# This file is the source of truth for all issue types in the organization.
# Changes here are synced to GitHub by the taxonomy-sync workflow.
#
# IDs are assigned by GitHub and resolved at runtime — do not add them here.
# The sync script matches types by name.
#
# To inspect current state:
#   gh api /orgs/MCF-Technologie-GmbH/issue-types

issue_types:
  - key: chore
    name: Chore
    description: "Konkrete Arbeitsaufgabe ohne direkten Feature-Charakter"
    color: YELLOW
    is_enabled: true

  - key: bug
    name: Bug
    description: "Unerwartetes Fehlverhalten oder Problem"
    color: RED
    is_enabled: true

  - key: feature
    name: Feature
    description: "Neue fachliche oder technische Funktionalität"
    color: BLUE
    is_enabled: true

  - key: improvement
    name: Improvement
    description: "Verbesserung bestehender Funktionalität"
    color: PINK
    is_enabled: true

  - key: spike
    name: Spike
    description: "A timeboxed technical investigation used to reduce uncertainty before implementation. It does not directly deliver production functionality, but must produce a clear technical conclusion, recommendation, or proof of concept."
    color: GRAY
    is_enabled: true

  - key: documentation
    name: Documentation
    description: "Dokumentation, Anleitung, Spezifikation"
    color: PURPLE
    is_enabled: true

  - key: maintenance
    name: Maintenance
    description: "Pflege, Refactoring, technische Schulden"
    color: ORANGE
    is_enabled: true

  - key: project
    name: Project
    description: null
    color: BLUE
    is_enabled: true

  - key: devops
    name: DevOps
    description: "CI/CD, deployment, runners, environments, tooling, build system"
    color: GRAY
    is_enabled: true
