# This workflow enforces that issue types cannot be changed after creation.
# Deploy this file to any repo in the org (or to the org's .github repo as a default workflow)
# where issue type immutability is required.

name: Enforce Immutable Issue Type

on:
  issues:
    types:
      - edited

permissions:
  issues: write
  contents: read

jobs:
  enforce-immutable-type:
    name: Revert unauthorized issue type change
    runs-on: self-hosted

    steps:
      - name: Revert issue type change
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.issue.number;

            // Only act if this edit was a type change.
            const changes = context.payload.changes ?? {};
            if (!changes.type) {
              core.info("Edit was not a type change. No action needed.");
              return;
            }

            const previousTypeName = changes.type?.from?.name;
            if (!previousTypeName) {
              core.info("No previous type found in payload. Cannot revert.");
              return;
            }

            const result = await github.graphql(`
              query($owner: String!, $repo: String!, $issueNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $issueNumber) {
                    id
                    issueType { name }
                  }
                }
              }
            `, { owner, repo, issueNumber });

            const issue = result.repository.issue;
            const currentType = issue.issueType?.name ?? "none";

            core.info(`Type change detected: "${previousTypeName}" → "${currentType}"`);

            if (currentType === previousTypeName) {
              core.info("Type is already the original value. No action needed.");
              return;
            }

            // Find the original type ID in the org to revert.
            const orgResult = await github.graphql(`
              query($org: String!) {
                organization(login: $org) {
                  issueTypes(first: 20) {
                    nodes { id name }
                  }
                }
              }
            `, { org: owner });

            const originalTypeNode = orgResult.organization.issueTypes.nodes
              .find(t => t.name === previousTypeName);

            if (!originalTypeNode) {
              core.setFailed(`Issue type "${previousTypeName}" not found in organization. Cannot revert.`);
              return;
            }

            await github.graphql(`
              mutation($issueId: ID!, $issueTypeId: ID!) {
                updateIssue(input: { id: $issueId, issueTypeId: $issueTypeId }) {
                  issue { issueType { name } }
                }
              }
            `, { issueId: issue.id, issueTypeId: originalTypeNode.id });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: [
                `An attempt to change this issue's type from \`${previousTypeName}\` to \`${currentType}\` was automatically reverted.`,
                "",
                "Issue types cannot be changed after creation. The original type has been restored."
              ].join("\n")
            });

            core.info(`Issue type reverted from "${currentType}" to "${previousTypeName}".`);
